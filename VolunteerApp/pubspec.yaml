name: volunteer_app
description: Volunteer Management Mobile App (Android/iOS)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Routing
  go_router: ^13.2.0

  # Secure Storage (for JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Image handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Utils
  equatable: ^2.0.5
  intl: ^0.20.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
